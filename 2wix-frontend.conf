# HTTP server - редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name 2wix.ru www.2wix.ru;
    return 301 https://$host$request_uri;
}

# HTTPS server для 2wix.ru (используем сертификат api.2wix.ru)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 2wix.ru www.2wix.ru;

    # Используем существующий сертификат api.2wix.ru
    ssl_certificate     /etc/letsencrypt/live/api.2wix.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.2wix.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/2wix-frontend-access.log;
    error_log /var/log/nginx/2wix-frontend-error.log;

    root /var/www/html;
    index index.html;

    # Статические файлы фронтенда
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy - проксируем /api/* на backend
    location /api/ {
        proxy_pass https://api.2wix.ru/api/;
        proxy_http_version 1.1;
        
        # Standard proxy headers
        proxy_set_header Host api.2wix.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "https://2wix.ru" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials true always;
        
        # No caching for API
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        
        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://2wix.ru" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Socket.IO proxy - проксируем /socket.io/* на backend
    location /socket.io/ {
        proxy_pass https://api.2wix.ru/socket.io/;
        proxy_http_version 1.1;
        
        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host api.2wix.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # CORS headers
        add_header Access-Control-Allow-Origin "https://2wix.ru" always;
        add_header Access-Control-Allow-Credentials true always;
        
        # Disable buffering for WebSocket
        proxy_buffering off;
        proxy_cache off;
        
        # Timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
