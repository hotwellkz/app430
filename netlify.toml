# Отключаем срабатывание сканера на Firebase API key (он публичный для клиента)
# https://ntl.fyi/configure-secrets-scanning
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# Kaspi: синхронизация заказов 4 раза в день (09:00, 13:00, 17:00, 21:00 UTC)
[functions.kaspi-sync-scheduled]
  schedule = "0 9,13,17,21 * * *"

[functions.ai-control-alerts-scheduled]
  schedule = "*/5 * * * *"

# Voice: pending postCallStatus → summary/extraction/CRM (serverless sweep)
[functions.voice-post-call-sweep]
  schedule = "*/4 * * * *"

# Voice: scheduled auto-retry / callback dispatch
[functions.voice-retry-sweep]
  schedule = "*/5 * * * *"

[functions.voice-campaign-sweep]
  schedule = "*/2 * * * *"

# Webhook Wazzup → Netlify function (должен быть выше правила /*)
[[redirects]]
  from = "/api/wazzup/webhook"
  to = "/.netlify/functions/wazzup-webhook"
  status = 200
  force = true

[[redirects]]
  from = "/api/send-whatsapp-message"
